      <style>
        /* From: /assets/styles/general.css */

        @import url("https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Comfortaa:wght@300..700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=MuseoModerno:ital,wght@0,100..900;1,100..900&family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&family=Noto+Color+Emoji&family=Noto+Sans+Egyptian+Hieroglyphs&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Pixelify+Sans:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");

        :root {
          --google-green: #0F9D58;
          --google-yellow: #F4B400;
          --google-blue: #4285F4;
          --google-red: #DB4437;
          /* Source: https://partnermarketinghub.withgoogle.com/brands/google-play/visual-identity/color-palette/ */
          
          scroll-behavior: smooth;
        }

        * {
          -webkit-tap-highlight-color: transparent;
          -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        *:focus-visible {
          outline: 4px dashed orange;
        }

        html, body {
          height: 100%;
          width: 100%;
          padding: 0;
          margin: 0;
          font-family: "Inter", "Roboto", "Arial", "sans-serif";
        }

        .emoji {
          font-family: "Noto Color Emoji", Arial, Helvetica, sans-serif;
        }


        /* From: /assets/styles/root/main.css */

        html, body, header, footer {
          width: 100%;
          height: 100%;
          padding: 0;
          margin: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          text-align: center;
        }

        h1, h2, h3, h4, h5, h6 {
          margin: 0.3em;
          padding: 0;
        }

        /* #smiley {
          width: 50px;
          position: fixed;
          bottom: 10px;
          right: 10px;
        } */

        a:active {
          opacity: 0.8;
        }

        button {
          cursor: pointer;
          padding: 10px 16px;
          font-family: inherit;
          font-size: inherit;
          border: none;
          background-color: var(--google-blue);
          color: white;
          border-radius: 9999px;
          transition: all 0.12s;
        }

        button:hover {
          opacity: 0.86;
        }

        button:active {
          opacity: 0.7;
        }

        button:disabled {
          cursor: not-allowed;
          opacity: 0.6;
        }

        header h4 {
          color: lightgrey;
        }

        main {
          display: flex;
          flex-direction: column;
          align-items: end;
          padding: 10px;
        }

        .pages {
          width: 100%;
          border-bottom: 1px solid lightgrey;
          padding: 0;
          margin: 0;
          padding-bottom: 4px;
          margin-bottom: 8px;
          list-style-type: none;
          display: flex;
          flex-direction: row;
          justify-content: left;
          align-items: center;
          column-gap: 8px;
          color: grey;
          cursor: default;
        }

        .pages a {
          color: #646380;
          text-decoration: none;
          cursor: pointer;
        }

        .pages a:hover {
          text-decoration: underline;
        }

        #img-random {
          max-width: 400px;
          width: 100%;
          display: block;
        }

        .credits {
          color: grey;
          margin: 6px 0px;
        }

        .credits a {
          color: grey;
          text-decoration: none;
          transition: all 0.12s;
        }

        .credits a:visited {
          color: grey;
          text-decoration: none;
        }

        .credits a:hover {
          color: blue;
        }

        .credits span.no-cred:hover {
          color: grey;
        }

        #longer-btn {
          display: block;
        }

        #cancel-btn {
          background-color: var(--google-red);
          margin: 12px;
          display: none;
        }

        #blank-content {
          height: 0px;
        }

        #end-msg-1 {
          display: none;
          margin-top: 1000px;
          padding: 18px;
        }

        @media(prefers-color-scheme: dark) {
          html {
            color: white;
          }

          body {
            background-color: black;
          }

          .credits span.no-cred:hover {
            color: grey;
          }

          .pages {
            color: lightgrey;
          }

          .pages a {
            color: lightblue;
          }
        }


        /* Other */

        div#placeholder-msg {
          background-color: blanchedalmond;
          border-top: 1px solid #FFCD90;
          width: 100%;
          padding: 0.2em 0;
          font-size: 0.9em;
          display: flex;
          align-items: center;
          justify-content: center;
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          opacity: 0.3;
          /* opacity: 1; */
          filter: brightness(110%);
          transition: all 0.16s;
        }

        div#placeholder-msg a {
          color: #646380;
          text-decoration: none;
        }

        div#placeholder-msg a:hover {
          text-decoration: underline;
        }

        div#placeholder-msg:hover {
          filter: none;
          opacity: 1;
        }

        div#placeholder-msg button#close-btn {
          padding: 0;
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          position: absolute;
          right: 0;
          height: 100%;
          background: none;
          border-radius: 0;
          transition: all 0.16s;
        }

        div#placeholder-msg button#close-btn:hover {
          background-color: #FFFFFFCC;
        }

        div#placeholder-msg button#close-btn:active {
          opacity: 0.6;
        }

        div#placeholder-msg button#close-btn img {
          height: 90%;
          margin: 0 0.1em;
        }

        #img-container {
          /* border: 5px solid orange; */
          overflow: hidden;
          max-width: 25em;
          min-height: 24em;
          max-height: 32em;
          height: fit-content;
          width: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          object-fit: cover;
        }

        #img-container img {
          object-fit: cover;
          display: inline;
          width: 100%;
          height: 100%;
        }

        @media screen and (width < 430px) {
          div#placeholder-msg {
            padding: 0.6em 0;
            padding-left: 0.4em;
            justify-content: start;
          }

          div#placeholder-msg button#close-btn img {
            height: 80%;
            margin: 0 0.6em;
          }
        }
      </style>
  </head>
  <body>
    <header>
      <h1>I will put something here soon</h1>
      <h4>surely</h4>
    </header>
    <br>
    <main>
      <ul class="pages">
        <span>Pages:</span>
        <li><a href="#" target="_parent">Home</a></li>|
        <li><a href="/links" target="_parent">Links</a></li>|
        <li><a href="https://stormzulien.straw.page" target="_parent">Strawpage</a></li>
      </ul>
      <div id="img-container">
        <img alt="A penguin" id="img-random" src="/assets/media/images/penguin/penguin_small.webp" title="A &#x1D4DF;&#x1D4EE;&#x1D4F7;&#x1D4F0;&#x1D4FE;&#x1D4F2;&#x1D4F7;.">
      </div>

    <br>
    <footer>
      <p id="end-msg-0">(this is the end of the page)</p>
      <button id="longer-btn" title="longer button">Make it longer</button>
      <button id="cancel-btn" title="cancel button">Cancel</button>
      <br>
      <div id="blank-content" title="Amazing Content #WOW"></div>
      <p id="end-msg-1">(this is now the end of the page)</p>
    </footer>
    
    <!-- <script type="module" src="/assets/scripts/root/main.js"></script> -->
    <script>
      /* From: /assets/scripts/root/main.js */
      "use strict";

      const longerBtn = document.querySelector("#longer-btn");
      longerBtn.clickCount = 0;
      const blankContent = document.querySelector("#blank-content");
      const endMsg_0 = document.querySelector("#end-msg-0");
      const endMsg_1 = document.querySelector("#end-msg-1");
      const cancelBtn = document.querySelector("#cancel-btn");

      blankContent.style.height = "40px";

      longerBtn.addEventListener("click", () => {
        if (longerBtn.clickCount === 0) {
          cancelBtn.style.display = "initial";
          longerBtn.innerHTML = "Are you sure?<br>This cannot be undone.";
          longerBtn.clickCount++;
          longerBtn.title = "currently a longer button";
        } else if (longerBtn.clickCount === 1) {
          cancelBtn.style.display = "none";
          blankContent.style.height = `${1000}px`;
          endMsg_1.style.display = "initial";
          endMsg_0.innerHTML = "(this is no longer the end of the page)";
          longerBtn.innerHTML = "The page has been made longer.<br>Please enjoy the great lengthiness of your page.";
          longerBtn.title = "no longer a longer button";
          longerBtn.disabled = true;
        }
      });

      cancelBtn.addEventListener("click", () => {
        longerBtn.clickCount = 0;
        cancelBtn.style.display = "none";
        longerBtn.innerHTML = "Make it longer";
        longerBtn.title = "longer button";
      });

      /* Other */

      const imgContainer = document.querySelector("#img-container");
      const randomImg = document.querySelector("#img-random");
      const images = [
        {
          src: "/assets/media/images/penguin/penguin_small.webp",
          alt: "A penguin",
          title: "A 𝓟𝓮𝓷𝓰𝓾𝓲𝓷.",
          credit: "https://w.wiki/HbJ7",
          creditText: "Someone on Wikipedia"
        },
        {
          src: "/assets/media/images/random/llama_and_fox_small.webp",
          alt: "small Minecraft llama and fox figures with a TY cat plush in the background",
          title: "✪ ω ✪",
          credit: "own"
        },
        {
          src: "/assets/media/images/random/axolotl.webp",
          alt: "Minecraft axolotl lamp sitting on a textbook",
          title: "*^____^*",
          credit: "own"
        },
        {
          src: "/assets/media/images/random/creeper.webp",
          alt: "Minecraft creeper LEGO model",
          title: "💥",
          credit: "own"
        },
        {
          src: "/assets/media/images/random/lego_happy_plants.webp",
          alt: "LEGO plants",
          title: "LEGO plants",
          credit: "own"
        },
        {
          src: "/assets/media/images/random/ninjago_book_fs_jay.webp",
          alt: "LEGO Ninjago “Jay” minifigure",
          title: "Jay",
          credit: "own"
        },
        {
          src: "/assets/media/images/random/peppa.webp",
          alt: "3D Peppa Pig facing forwards with 4 eyes",
          title: "✂👀🐷👀",
          credit: "https://www.youtube.com/watch?v=MDvWh37c3cE",
          creditText: "Surreal Entertainment / YouTube"
        },
        {
          src: "/assets/media/images/random/2025-11-07_19.23.04.png",
          alt: "A screenshot of Minecraft, in the night, with a Copper Golem looking at a fox sleeping of a pile of rocks, with the moon behind them. They are in a taiga biome",
          title: "🤖 👁-> 🦊",
          credit: "own"
        },
        {
          src: "/assets/media/images/random/sky_2.png",
          alt: "Close up of the sky, from Google Maps Street View, little orange man dropped on random location in northern Scotland",
          title: "☁☁☁☁☁☁☁☁☁☁☁☁☁☁☁☁",
          credit: "https://maps.app.goo.gl/1EgBrhDc6qD2o4Do8",
          creditText: "Google Street View"
        },
        {
          src: "/assets/media/images/random/love_powerpnt.png",
          alt: "That hearl locket with the PowerPoint logo on the left and badly cropped red roses on the right",
          title: "💝💓❤💟💟💌❣♥💘🥰",
          credit: "own"
        },
        {
          src: "/assets/media/images/random/nasa_pride_flag.jpg",
          alt: "Pride flag made using NASA imagery",
          title: "Pride flag made using NASA imagery",
          credit: "https://web.archive.org/web/20250129182253/https://svs.gsfc.nasa.gov/14627/",
          creditText: "NASA"
        }
      ];

      const random = /*6 ||*/ Math.floor(Math.random() * images.length);
      let image;

      images.forEach((element, index) => {
        if (index === random) {
          image = element;
        }
      });

      randomImg.src = image.src;
      randomImg.alt = image.alt;
      randomImg.title = image.title;

      const creditsElem = document.createElement("span");
      creditsElem.classList.add("credits");

      if (image.credit === "own") {
        creditsElem.innerHTML = `[<span class="no-cred" title="Credits">My Image</span>]`;
      } else if (image.credit) {
        if (image.creditText) {
          creditsElem.innerHTML = `
            [<a 
              href="${image.credit}"
              target="_blank"
              title="Credits"
            >Source: ${image.creditText}</a>]
          `.trim();
        } else {
          creditsElem.innerHTML = `
            [<a 
              href="${image.credit}"
              target="_blank"
              title="Credits"
            >Source</a>]
          `.trim();
        }
      } else {
        creditsElem.innerHTML = `[<span class="no-cred">Unknown</span>]`;
      }

      imgContainer.insertAdjacentElement("afterend", creditsElem);


      // <span class="credits">
      //   [<a href="https://w.wiki/HbJ7" target="_blank" title="Credits">Source</a>]
      // </span>


      /* Message */

      const showMsg = false;

      let msgClosed = JSON.parse(localStorage.getItem("oldHomepageMsgClosed")) || !showMsg;

      if (!msgClosed && showMsg) {

        document.body.innerHTML += `
          <div id="placeholder-msg">
            <span>
              This was the old homepage.
              <a href="/">
                Here's the new one!
              </a>
            </span>
            <button id="close-btn" title="Close message">
              <img
                alt="Close icon"
                draggable="false"
                src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20height%3D%2240px%22%20viewBox%3D%220%20-960%20960%20960%22%20width%3D%2240px%22%20fill%3D%22%23000000%22%3E%3Cpath%20d%3D%22m251.33-204.67-46.66-46.66L433.33-480%20204.67-708.67l46.66-46.66L480-526.67l228.67-228.66%2046.66%2046.66L526.67-480l228.66%20228.67-46.66%2046.66L480-433.33%20251.33-204.67Z%22%2F%3E%3C%2Fsvg%3E"
              >
            </button>
          </div>
        `;

        const closeBtn = document.querySelector("#close-btn");
        const msg = document.querySelector("#placeholder-msg");
      
        closeBtn.addEventListener("click", () => {
          msg.remove();
          msgClosed = true;
          localStorage.setItem("oldHomepageMsgClosed", JSON.stringify(msgClosed));
        });
      }
    </script>
